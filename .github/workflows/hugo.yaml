name: 部署博客到 GitHub Pages 和 ECS

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  # 部署到 GitHub Pages
  deploy-github:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: 构建 GitHub Pages 版本
        run: hugo --minify --baseURL "https://${{ github.repository_owner }}.github.io/"

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: true

  # 部署到 ECS
  deploy-ecs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: 构建 ECS 版本
        run: hugo --minify --baseURL "http://yaocat.cloud"

      - name: 打包并部署到 ECS
        env:
          ECS_HOST: ${{ secrets.ECS_HOST }}
          ECS_USERNAME: ${{ secrets.ECS_USERNAME }}
          ECS_PORT: ${{ secrets.ECS_PORT }}
        run: |
          tar -czf blog-ecs.tar.gz -C public .
          echo "${{ secrets.ECS_SSH_KEY }}" > key && chmod 600 key
          scp -o StrictHostKeyChecking=no -P ${ECS_PORT} -i key blog-ecs.tar.gz ${ECS_USERNAME}@${ECS_HOST}:/tmp/
          ssh -o StrictHostKeyChecking=no -p ${ECS_PORT} -i key ${ECS_USERNAME}@${ECS_HOST}} << 'EOF'
            sudo mkdir -p /var/www/blog-new
            sudo tar -xzf /tmp/blog-ecs.tar.gz -C /var/www/blog-new/
            sudo rm -rf /var/www/blog-current
            sudo mv /var/www/blog-new /var/www/blog-current
            sudo systemctl reload nginx
            sudo rm -f /tmp/blog-ecs.tar.gz
          EOF
          rm -f key