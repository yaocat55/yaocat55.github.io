name: 部署博客到 GitHub Pages 和 ECS

on:
  push:
    branches:
      - main  # 当你推送代码到 main 分支时自动触发

# 给 workflow 写权限，部署需要
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码（包括 PaperMod 子模块）
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          submodules: true

      # 2. 安装 Hugo
      - name: 安装 Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      # 3. 构建博客（生成 public/ 目录）
      - name: 构建
        run: hugo --minify

      # 4. 部署到 GitHub Pages
      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
        continue-on-error: true  # 失败也继续下一步

      # 5. 部署到 ECS（通过 SCP 传输文件）
      - name: 部署到 ECS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ECS_HOST }}
          username: root
          key: ${{ secrets.ECS_SSH_KEY }}
          port: 22
          source: "public/*"
          target: "/var/www/blog/"
          strip_components: 1
        continue-on-error: true  # 失败也继续下一步

      # 6. 重启 ECS 上的 Nginx 容器
      - name: 重启 Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}
          username: root
          key: ${{ secrets.ECS_SSH_KEY }}
          port: 22
          script: |
            docker exec blog-nginx nginx -s reload
            echo "Nginx reloaded successfully"
        continue-on-error: true