name: 部署博客到 GitHub Pages 和 ECS

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: 安装 Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: 构建博客
        run: |
          echo "::group::Hugo Build"
          hugo --minify
          echo "::endgroup::"

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public

      - name: 打包静态文件
        run: |
          echo "::group::Packaging"
          tar -czf blog-public.tar.gz -C public .
          echo "::endgroup::"

      - name: 设置 SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ECS_SSH_KEY }}

      - name: 传输并部署到 ECS
        run: |
          # 将打包文件推送到服务器
          scp -o StrictHostKeyChecking=no -P ${{ secrets.ECS_PORT }} blog-public.tar.gz ${{ secrets.ECS_USERNAME }}@${{ secrets.ECS_HOST }}:/tmp/

          # 执行远程部署
          ssh -o StrictHostKeyChecking=no -p ${{ secrets.ECS_PORT }} ${{ secrets.ECS_USERNAME }}@${{ secrets.ECS_HOST }} << 'EOF'
            set -e

            TIMESTAMP=$(date +%Y%m%d%H%M%S)
            NEW_DIR="/var/www/blog-${TIMESTAMP}"
            CURRENT_LINK="/var/www/blog-current"

            echo "::group::Deploying to ${NEW_DIR}"

            # 1. 准备目录
            mkdir -p "${NEW_DIR}"
            tar -xzf /tmp/blog-public.tar.gz -C "${NEW_DIR}/"
            chmod -R 755 "${NEW_DIR}"

            # 2. 检查关键文件
            if [ ! -f "${NEW_DIR}/index.html" ]; then
              echo "❌ 部署失败: index.html 缺失"
              exit 1
            fi

            # 3. 更新 Nginx 配置
            cat > /tmp/default.conf << NGINXCONF
            server {
                listen 80;
                location / { root /var/www/blog-current; index index.html; }
            }
            NGINXCONF
            docker cp /tmp/default.conf blog-nginx:/etc/nginx/conf.d/default.conf

            # 4. 测试配置并切换软链
            if docker exec blog-nginx nginx -t >/dev/null 2>&1; then
              ln -sfn "${NEW_DIR}" "${CURRENT_LINK}"
              docker exec blog-nginx nginx -s reload
              echo "✅ 部署成功，当前版本: ${TIMESTAMP}"
            else
              echo "❌ Nginx 配置检查失败，保持旧版本不变"
              rm -rf "${NEW_DIR}"
              exit 1
            fi

            # 5. 清理旧版本 (保留最近5个)
            cd /var/www && ls -dt blog-20* | tail -n +6 | xargs -r rm -rf
            rm -f /tmp/blog-public.tar.gz /tmp/default.conf
            echo "::endgroup::"
          EOF

      - name: 清理本地环境
        run: rm -f blog-public.tar.gz