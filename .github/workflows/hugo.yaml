name: 部署博客到 GitHub Pages 和 ECS

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          submodules: true

      # 2. 安装 Hugo
      - name: 安装 Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      # 3. 构建博客
      - name: 构建
        run: hugo --minify

      # 4. 部署到 GitHub Pages
      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public

      # 5. 打包 public 目录
      - name: 打包 public 目录
        run: |
          tar -czf blog-public.tar.gz -C public .
          ls -lh blog-public.tar.gz

      # 6. 设置 SSH Agent
      - name: 设置 SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ECS_SSH_KEY }}

      # 7. 传输文件到 ECS
      - name: 传输文件到 ECS
        run: |
          scp -o StrictHostKeyChecking=no -P ${{ secrets.ECS_PORT }} blog-public.tar.gz ${{ secrets.ECS_USERNAME }}@${{ secrets.ECS_HOST }}:/tmp/

      # 8. 在 ECS 上执行零停机部署
      - name: 在 ECS 上执行部署（零停机）
        run: |
          ssh -o StrictHostKeyChecking=no -p ${{ secrets.ECS_PORT }} ${{ secrets.ECS_USERNAME }}@${{ secrets.ECS_HOST }} << 'EOF'
            set -e

            echo "🚀 开始零停机部署..."
            echo "部署时间: $(date '+%Y-%m-%d %H:%M:%S')"

            # 1. 准备新版本目录
            echo "📦 准备新版本..."
            rm -rf /var/www/blog-new
            mkdir -p /var/www/blog-new

            # 2. 解压到新目录
            tar -xzf /tmp/blog-public.tar.gz -C /var/www/blog-new/

            # 3. 验证新版本文件
            echo "🔍 验证新版本..."
            if [ ! -f /var/www/blog-new/index.html ]; then
              echo "❌ 错误: 新版本 index.html 不存在"
              rm -rf /var/www/blog-new
              exit 1
            fi

            # 4. 设置新版本权限
            chmod -R 755 /var/www/blog-new

            echo "📁 新版本文件列表:"
            ls -la /var/www/blog-new/ | head -10

            # 5. 切换符号链接（原子操作，零停机）
            echo "🔄 切换版本..."
            # 创建符号链接指向当前版本
            ln -sfn /var/www/blog-new /var/www/blog-current

            # 6. 更新 Nginx 配置指向新目录
            echo "📝 更新 Nginx 配置..."

            # 创建临时配置文件
            cat > /tmp/default.conf << 'NGINXCONF'
            server {
                listen       80;
                listen  [::]:80;
                server_name  localhost;

                location / {
                    root   /var/www/blog-current;
                    index  index.html index.htm;
                }

                error_page   500 502 503 504  /50x.html;
                location = /50x.html {
                    root   /usr/share/nginx/html;
                }
            }
            NGINXCONF

            # 复制新配置到容器
            docker cp /tmp/default.conf blog-nginx:/etc/nginx/conf.d/default.conf

            # 7. 测试 Nginx 配置
            echo "🔧 测试 Nginx 配置..."
            if docker exec blog-nginx nginx -t; then
              echo "✅ 配置测试通过"
            else
              echo "❌ 配置错误，回滚..."
              # 恢复旧配置
              docker exec blog-nginx nginx -s reload 2>/dev/null || true
              rm -rf /var/www/blog-new
              exit 1
            fi

            # 8. 优雅重载（零停机）
            echo "🔄 优雅重载 Nginx..."
            docker exec blog-nginx nginx -s reload

            # 9. 等待重载完成
            sleep 2

            # 10. 验证服务
            echo "🧪 验证服务..."
            HTTP_CODE=$(docker exec blog-nginx wget -O- -q http://localhost:80 --server-response 2>&1 | grep "HTTP/" | awk '{print $2}')
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ 服务验证成功 (HTTP $HTTP_CODE)"
            else
              echo "⚠️ 警告: 服务返回 HTTP $HTTP_CODE"
            fi

            # 11. 清理旧版本（保留最近3个版本用于快速回滚）
            echo "🗑️ 清理旧版本..."
            # 删除新版本标记（已切换）
            rm -f /tmp/blog-public.tar.gz

            # 保留最近3个版本
            cd /var/www
            ls -d blog-* 2>/dev/null | grep -v "blog-current" | sort | head -n -3 | xargs rm -rf 2>/dev/null || true

            # 12. 显示当前版本信息
            echo "✅ 部署完成！"
            echo "当前版本目录: $(readlink -f /var/www/blog-current)"
            echo "部署时间: $(date '+%Y-%m-%d %H:%M:%S')"

            # 13. 显示最近访问日志（验证服务正常）
            echo "📊 最近访问状态:"
            docker exec blog-nginx tail -3 /var/log/nginx/access.log 2>/dev/null | grep -v "^$" || echo "暂无访问日志"
          EOF

      # 9. 清理本地打包文件
      - name: 清理
        run: |
          rm -f blog-public.tar.gz