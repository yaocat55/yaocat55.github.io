name: 部署博客到 GitHub Pages 和 ECS

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          submodules: true

      # 2. 安装 Hugo
      - name: 安装 Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      # 3. 构建博客
      - name: 构建
        run: hugo --minify

      # 4. 部署到 GitHub Pages
      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public

      # ========== 以下是用方案 B 重写的 ECS 部署部分 ==========

      # 5. 打包 public 目录
      - name: 打包 public 目录
        run: |
          tar -czf blog-public.tar.gz -C public .
          ls -lh blog-public.tar.gz

      # 6. 设置 SSH Agent（用官方 action 处理私钥）
      - name: 设置 SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ECS_SSH_KEY }}

      # 7. 传输文件到 ECS（直接用 scp 命令）
      - name: 传输文件到 ECS
        run: |
          scp -o StrictHostKeyChecking=no -P ${{ secrets.ECS_PORT }} blog-public.tar.gz ${{ secrets.ECS_USERNAME }}@${{ secrets.ECS_HOST }}:/tmp/

      # 8. 在 ECS 上执行部署（直接用 ssh 命令）
      - name: 在 ECS 上执行部署
        run: |
          ssh -o StrictHostKeyChecking=no -p ${{ secrets.ECS_PORT }} ${{ secrets.ECS_USERNAME }}@${{ secrets.ECS_HOST }} << 'EOF'
            # 解压到临时目录
            mkdir -p /tmp/blog-deploy
            tar -xzf /tmp/blog-public.tar.gz -C /tmp/blog-deploy/

            # 备份旧文件
            rm -rf /var/www/blog.bak
            mv /var/www/blog /var/www/blog.bak 2>/dev/null || true

            # 移动新文件
            mv /tmp/blog-deploy /var/www/blog

            # 清理临时文件
            rm -f /tmp/blog-public.tar.gz
            rm -rf /tmp/blog-deploy

            # 设置权限
            chown -R www-data:www-data /var/www/blog 2>/dev/null || true

            # 验证并重载 nginx
            docker exec blog-nginx nginx -t && docker exec blog-nginx nginx -s reload

            echo "✅ 部署完成"
            echo "部署时间: $(date '+%Y-%m-%d %H:%M:%S')"
          EOF