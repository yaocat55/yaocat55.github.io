name: 部署博客到 GitHub Pages 和 ECS

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: 安装 Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: 构建博客（双域名）
        run: |
          echo "::group::Hugo Build for GitHub Pages"
          hugo --baseURL "https://${{ github.repository_owner }}.github.io/" --minify --destination public-github
          echo "::group::Hugo Build for ECS"
          hugo --baseURL "http://yaocat.cloud" --minify --destination public-ecs
          echo "::endgroup::"

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public-github
          publish_branch: gh-pages
          force_orphan: true

      - name: 打包 ECS 静态文件
        run: |
          echo "::group::Packaging for ECS"
          tar -czf blog-ecs.tar.gz -C public-ecs .
          echo "::endgroup::"

      - name: 设置 SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ECS_SSH_KEY }}

      - name: 部署到 ECS
        env:
          ECS_HOST: ${{ secrets.ECS_HOST }}
          ECS_USERNAME: ${{ secrets.ECS_USERNAME }}
          ECS_PORT: ${{ secrets.ECS_PORT }}
          ECS_DOMAIN: ${{ secrets.ECS_DOMAIN }}
        run: |
          # 1. 将打包文件推送到服务器
          scp -o StrictHostKeyChecking=no -P ${ECS_PORT} blog-ecs.tar.gz ${ECS_USERNAME}@${ECS_HOST}:/tmp/

          # 2. 执行远程部署（改用单行命令拼接，彻底根除 EOF 带来的 YAML 解析和缩进问题）
          ssh -o StrictHostKeyChecking=no -p ${ECS_PORT} ${ECS_USERNAME}@${ECS_HOST} \
            "set -e && \
             TIMESTAMP=\$(date +%Y%m%d%H%M%S) && \
             NEW_DIR=\"/var/www/blog-\${TIMESTAMP}\" && \
             CURRENT_LINK=\"/var/www/blog-current\" && \
             echo \"::group::Deploying to \${NEW_DIR}\" && \
             sudo mkdir -p \"\${NEW_DIR}\" && \
             sudo tar -xzf /tmp/blog-ecs.tar.gz -C \"\${NEW_DIR}/\" && \
             sudo chmod -R 755 \"\${NEW_DIR}\" && \
             if [ ! -f \"\${NEW_DIR}/index.html\" ]; then echo \"❌ 部署失败: index.html 缺失\"; exit 1; fi && \
             NGINX_CONF=\"server { listen 80; server_name ${ECS_DOMAIN}; root \${CURRENT_LINK}; index index.html; location / { try_files \\\$uri \\\$uri/ =404; } }\" && \
             if docker ps | grep -q 'blog-nginx'; then \
               echo \"检测到 Docker Nginx 容器\" && \
               echo \"\${NGINX_CONF}\" > /tmp/default.conf && \
               docker cp /tmp/default.conf blog-nginx:/etc/nginx/conf.d/default.conf && \
               docker exec blog-nginx nginx -t && \
               docker exec blog-nginx nginx -s reload; \
             else \
               echo \"检测到系统 Nginx\" && \
               echo \"\${NGINX_CONF}\" | sudo tee /etc/nginx/sites-available/blog > /dev/null && \
               sudo ln -sf /etc/nginx/sites-available/blog /etc/nginx/sites-enabled/ && \
               sudo nginx -t && \
               sudo systemctl reload nginx; \
             fi && \
             sudo ln -sfn \"\${NEW_DIR}\" \"\${CURRENT_LINK}\" && \
             echo \"✅ 部署成功，当前版本: \${TIMESTAMP}\" && \
             cd /var/www && sudo ls -dt blog-20* 2>/dev/null | tail -n +6 | sudo xargs -r rm -rf && \
             sudo rm -f /tmp/blog-ecs.tar.gz /tmp/default.conf && \
             echo \"::endgroup::\""

      - name: 清理本地环境
        if: always()
        run: rm -f blog-ecs.tar.gz

      - name: 部署状态通知
        if: always()
        run: |
          echo "## 部署总结" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ GitHub Pages: https://${{ github.repository_owner }}.github.io" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ ECS: http://yaocat.cloud" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📝 注意事项" >> $GITHUB_STEP_SUMMARY
          echo "- GitHub Pages 使用 HTTPS" >> $GITHUB_STEP_SUMMARY
          echo "- ECS 目前使用 HTTP，建议后续升级到 HTTPS" >> $GITHUB_STEP_SUMMARY