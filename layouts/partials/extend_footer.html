<!-- ==================== 看板娘强制右下角样式 ==================== -->
<style>
    /* 强制覆盖，确保看板娘在右下角 */
    body .waifu {
        left: auto !important;
        right: 0 !important;
        bottom: 0 !important;
        top: auto !important;
        transform: none !important;
    }

    /* 强制覆盖对话框位置 */
    body .waifu-tips {
        bottom: 80px !important;
        right: 20px !important;
        left: auto !important;
    }

    /* 移动端隐藏看板娘（JS 保底失效时的 CSS 防线） */
    @media (max-width: 768px) {
        body .waifu,
        body .waifu-tips,
        body .waifu * {
            display: none !important;
        }
    }
</style>

<!-- ========== Live2D Widget 初始化脚本 ========== -->
<script>
    (function () {
        // 防止重复初始化整个模块
        if (window._live2dModuleInitialized) {
            console.log('看板娘模块已初始化，跳过');
            return;
        }
        window._live2dModuleInitialized = true;

        // 使用 window 上的变量，避免重复声明
        if (typeof window._live2dResourcesLoaded === 'undefined') {
            window._live2dResourcesLoaded = false;
            window._live2dModelRendered = false;
        }

        if (window._live2dResourcesLoaded) {
            console.log('看板娘资源已加载，跳过');
            return;
        }

        const libCdnPath = 'https://cdn.jsdelivr.net/gh/letere-gzj/live2d-widget-v3@main';
        const myModelCdnPath = 'https://cdn.jsdelivr.net/gh/yaocat55/Resources@v1.1.4/';

        const config = {
            path: {
                homePath: '/',
                modelPath: myModelCdnPath,
                cssPath: libCdnPath + "/waifu.css",
                tipsJsonPath: "/waifu-tips.json",
                tipsJsPath: "/libs/waifu-tips.js",
                live2dCorePath: libCdnPath + "/Core/live2dcubismcore.js",
                live2dSdkPath: libCdnPath + "/live2d-sdk.js"
            },
            tools: ["hitokoto", "asteroids", "express", "switch-model", "switch-texture", "photo", "info", "quit"],
            drag: { enable: true, direction: ["x", "y"] },
            switchType: "order"
        };

        function loadExternalResource(url, type) {
            return new Promise((resolve, reject) => {
                let tag;
                if (type === "css") {
                    tag = document.createElement("link");
                    tag.rel = "stylesheet";
                    tag.href = url;
                } else if (type === "js") {
                    tag = document.createElement("script");
                    tag.src = url;
                    tag.async = true;
                }
                if (!tag) return reject("Unknown type: " + type);
                tag.onload = () => resolve(url);
                tag.onerror = () => reject(url);
                document.head.appendChild(tag);
            });
        }

        function domReady() {
            return new Promise(resolve => {
                if (document.readyState === "loading") {
                    document.addEventListener("DOMContentLoaded", resolve);
                } else {
                    resolve();
                }
            });
        }

        function renderModel() {
            if (window._live2dModelRendered) return;
            window._live2dModelRendered = true;

            if (typeof initWidget !== 'undefined') {
                initWidget({
                    homePath: config.path.homePath,
                    waifuPath: config.path.tipsJsonPath,
                    cdnPath: config.path.modelPath,
                    tools: config.tools,
                    dragEnable: config.drag.enable,
                    dragDirection: config.drag.direction,
                    switchType: config.switchType
                });

                const style = document.createElement('style');
                style.innerHTML = `
                #waifu {
                    position: fixed !important;
                    right: 20px;
                    bottom: 0;
                    left: auto !important;
                    top: auto !important;
                    z-index: 9999;
                }
                `;
                document.head.appendChild(style);

                console.log("✅ Live2D 看板娘加载完成");
            } else {
                console.warn("initWidget 未定义，500ms 后重试");
                setTimeout(renderModel, 500);
            }
        }

        async function loadLive2dResources() {
            if (window._live2dResourcesLoaded) return true;
            window._live2dResourcesLoaded = true;

            if (!window.matchMedia("(min-width: 768px)").matches) {
                return false;
            }

            await domReady();

            try {
                await Promise.all([
                    loadExternalResource(config.path.cssPath, "css"),
                    loadExternalResource(config.path.live2dCorePath, "js"),
                    loadExternalResource(config.path.live2dSdkPath, "js")
                ]);
                await loadExternalResource(config.path.tipsJsPath, "js");
                renderModel();
                return true;
            } catch (err) {
                console.error("❌ Live2D 加载失败:", err);
                return false;
            }
        }

        loadLive2dResources();
    })();
</script>

<!-- ==================== 猫爪点击特效 ==================== -->
<script>
    (function () {
        // 避免重复添加样式
        if (!document.querySelector('#cat-paw-style')) {
            const style = document.createElement("style");
            style.id = 'cat-paw-style';
            style.innerHTML = `
                .cat-paw {
                    position: fixed;
                    pointer-events: none;
                    z-index: 999999;
                    font-size: 26px;
                    user-select: none;
                    animation: catPawFade 1.8s ease-out forwards;
                    transform-origin: center;
                }
                @keyframes catPawFade {
                    0% {
                        opacity: 0;
                        transform: scale(0.4) rotate(var(--rotate));
                    }
                    20% {
                        opacity: 1;
                        transform: scale(1.1) rotate(var(--rotate));
                    }
                    100% {
                        opacity: 0;
                        transform: translateY(-25px) scale(0.8) rotate(var(--rotate));
                    }
                }
            `;
            document.head.appendChild(style);
        }

        function isDarkMode() {
            return document.documentElement.classList.contains("dark");
        }

        // 避免重复绑定事件
        if (!window._catPawBound) {
            window._catPawBound = true;
            document.body.addEventListener("click", function (e) {
                const paw = document.createElement("div");
                paw.className = "cat-paw";
                paw.textContent = "🐾";
                const rotate = (Math.random() * 60 - 30).toFixed(0) + "deg";
                paw.style.setProperty("--rotate", rotate);
                paw.style.left = (e.clientX - 10) + "px";
                paw.style.top = (e.clientY - 10) + "px";

                if (isDarkMode()) {
                    paw.style.color = "#9cffb5";
                    paw.style.textShadow = `
                        0 0 8px rgba(156,255,181,.8),
                        0 0 15px rgba(156,255,181,.6),
                        0 0 25px rgba(156,255,181,.4)
                    `;
                } else {
                    paw.style.color = "#2f7d32";
                    paw.style.textShadow = `0 0 4px rgba(47,125,50,.15)`;
                }

                document.body.appendChild(paw);
                setTimeout(() => paw.remove(), 1800);
            });
        }
    })();
</script>
