<!-- ========== Live2D Widget 初始化脚本 ========== -->
<script>
    let live2dResourcesLoaded = false;
    let live2dModelRendered = false;

    const libCdnPath = 'https://cdn.jsdelivr.net/gh/letere-gzj/live2d-widget-v3@main';
    const myModelCdnPath = 'https://cdn.jsdelivr.net/gh/yaocat55/Resources@v1.0.7/';

    const config = {
        path: {
            homePath: '/',
            modelPath: myModelCdnPath,
            cssPath: libCdnPath + "/waifu.css",
            tipsJsonPath:  "/waifu-tips.json",
            tipsJsPath:  "/libs/waifu-tips.js",
            live2dCorePath: libCdnPath + "/Core/live2dcubismcore.js",
            live2dSdkPath: libCdnPath + "/live2d-sdk.js"
        },
        tools: ["hitokoto", "asteroids", "express", "switch-model", "switch-texture", "photo", "info", "quit"],
        drag: { enable: true, direction: ["x", "y"] },
        switchType: "order"
    };

    function loadExternalResource(url, type) {
        return new Promise((resolve, reject) => {
            let tag;
            if (type === "css") {
                tag = document.createElement("link");
                tag.rel = "stylesheet";
                tag.href = url;
            } else if (type === "js") {
                tag = document.createElement("script");
                tag.src = url;
                tag.async = true;
            }
            if (!tag) return reject("Unknown type: " + type);
            tag.onload = () => resolve(url);
            tag.onerror = () => reject(url);
            document.head.appendChild(tag);
        });
    }

    function domReady() {
        return new Promise(resolve => {
            if (document.readyState === "loading") {
                document.addEventListener("DOMContentLoaded", resolve);
            } else {
                resolve();
            }
        });
    }

    function renderModel() {
        if (live2dModelRendered) return;
        live2dModelRendered = true;

        initWidget({
            homePath: config.path.homePath,
            waifuPath: config.path.tipsJsonPath,
            cdnPath: config.path.modelPath,
            tools: config.tools,
            dragEnable: config.drag.enable,
            dragDirection: config.drag.direction,
            switchType: config.switchType
        });

        const style = document.createElement('style');
        style.innerHTML = `
        #waifu {
            position: fixed !important;
            right: 20px;
            bottom: 0;
            left: auto !important;
            top: auto !important;
            z-index: 9999;
        }
        `;
        document.head.appendChild(style);
    }

    async function loadLive2dResources() {
        if (live2dResourcesLoaded) return true;
        live2dResourcesLoaded = true;

        if (!window.matchMedia("(min-width: 768px)").matches) {
            return false;
        }

        await domReady();

        try {
            await Promise.all([
                loadExternalResource(config.path.cssPath, "css"),
                loadExternalResource(config.path.live2dCorePath, "js"),
                loadExternalResource(config.path.live2dSdkPath, "js")
            ]);
            await loadExternalResource(config.path.tipsJsPath, "js");
            renderModel();
            console.log("✅ Live2D 看板娘加载完成");
            return true;
        } catch (err) {
            console.error("❌ Live2D 加载失败:", err);
            return false;
        }
    }

    loadLive2dResources();






</script>

<!-- ==================== 猫爪点击特效 ==================== -->
<script>
    (() => {
        if (!document.querySelector('#cat-paw-style')) {
            const style = document.createElement("style");
            style.id = 'cat-paw-style';
            style.innerHTML = `
                .cat-paw {
                    position: fixed;
                    pointer-events: none;
                    z-index: 999999;
                    font-size: 26px;
                    user-select: none;
                    animation: catPawFade 1.8s ease-out forwards;
                    transform-origin: center;
                }
                @keyframes catPawFade {
                    0% {
                        opacity: 0;
                        transform: scale(0.4) rotate(var(--rotate));
                    }
                    20% {
                        opacity: 1;
                        transform: scale(1.1) rotate(var(--rotate));
                    }
                    100% {
                        opacity: 0;
                        transform: translateY(-25px) scale(0.8) rotate(var(--rotate));
                    }
                }
            `;
            document.head.appendChild(style);
        }

        function isDarkMode() {
            return document.documentElement.classList.contains("dark");
        }

        document.body.addEventListener("click", function (e) {
            const paw = document.createElement("div");
            paw.className = "cat-paw";
            paw.textContent = "🐾";
            const rotate = (Math.random() * 60 - 30).toFixed(0) + "deg";
            paw.style.setProperty("--rotate", rotate);
            paw.style.left = (e.clientX - 10) + "px";
            paw.style.top = (e.clientY - 10) + "px";

            if (isDarkMode()) {
                paw.style.color = "#9cffb5";
                paw.style.textShadow = `
                    0 0 8px rgba(156,255,181,.8),
                    0 0 15px rgba(156,255,181,.6),
                    0 0 25px rgba(156,255,181,.4)
                `;
            } else {
                paw.style.color = "#2f7d32";
                paw.style.textShadow = `0 0 4px rgba(47,125,50,.15)`;
            }

            document.body.appendChild(paw);
            setTimeout(() => paw.remove(), 1800);
        });
    })();
</script>

<!-- ==================== Cat Radio v1.3 ==================== -->
<audio id="cat-player" preload="metadata"></audio>

<div id="cat-radio">
    <div id="cat-btn">🐱</div>
    <div id="cat-info">Cat Radio</div>
</div>

<style>
    #cat-radio {
        position: fixed;
        right: 90px;
        bottom: 20px;
        z-index: 99999;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    #cat-btn {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: rgba(255, 220, 230, 0.92);
        backdrop-filter: blur(8px);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 26px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, .15);
        border: 1px solid rgba(255, 200, 200, 0.5);
        transition: all .3s ease;
    }

    #cat-btn:hover {
        transform: scale(1.15) rotate(8deg);
        background: rgba(255, 200, 210, 0.96);
        box-shadow: 0 6px 20px rgba(0, 0, 0, .2);
    }

    #cat-info {
        max-width: 220px;
        padding: 8px 14px;
        border-radius: 30px;
        background: rgba(255, 220, 230, 0.9);
        backdrop-filter: blur(8px);
        font-size: 13px;
        font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', monospace;
        font-weight: 500;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        box-shadow: 0 4px 15px rgba(0, 0, 0, .12);
        border: 1px solid rgba(255, 200, 200, 0.4);
        transition: all 0.2s ease;
    }

    html.dark #cat-btn,
    html.dark #cat-info,
    [data-theme="dark"] #cat-btn,
    [data-theme="dark"] #cat-info {
        background: rgba(50, 40, 55, 0.9);
        color: #ffe0e8;
        border-color: rgba(255, 180, 200, 0.3);
    }

    @media (max-width: 768px) {
        #cat-radio {
            right: 20px;
            bottom: 20px;
        }

        #cat-info {
            display: none;
        }

        #cat-btn {
            width: 48px;
            height: 48px;
            font-size: 22px;
        }
    }

    .waifu-tips {
        font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', monospace !important;
        background: rgba(255, 240, 245, 0.95) !important;
        border-radius: 20px !important;
        border: 1px solid rgba(255, 180, 200, 0.5) !important;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1) !important;
    }

    html.dark .waifu-tips {
        background: rgba(45, 35, 50, 0.95) !important;
        color: #ffdde8 !important;
        border-color: rgba(255, 160, 190, 0.4) !important;
    }
</style>

<script>
    (() => {
        const playlist = [
            { name: "brain rot", file: "/music/brain rot.mp3" },
            { name: "dehors", file: "/music/dehors.mp3" },
            { name: "I love you so", file: "/music/I love you so.mp3" },
            { name: "odoriko", file: "/music/odoriko.mp3" },
            { name: "tek it", file: "/music/tek it.mp3" }
        ];

        const audio = document.getElementById("cat-player");
        const btn = document.getElementById("cat-btn");
        const info = document.getElementById("cat-info");

        let current = parseInt(localStorage.getItem("cat-radio-index") || "0");
        let eventsBound = false;

        // ==================== 消息队列（不互相覆盖） ====================
        let messageQueue = [];
        let isShowingMessage = false;

        function showQueuedMessage() {
            if (isShowingMessage || messageQueue.length === 0) return;

            isShowingMessage = true;
            const next = messageQueue.shift();

            if (window.showMessage && typeof window.showMessage === 'function') {
                window.showMessage(next.message, next.duration);
                setTimeout(() => {
                    isShowingMessage = false;
                    showQueuedMessage();
                }, next.duration + 300);
            } else {
                const tipsDiv = document.querySelector('#waifu-tips');
                if (tipsDiv) {
                    tipsDiv.textContent = next.message;
                    tipsDiv.style.opacity = '1';
                    setTimeout(() => {
                        tipsDiv.style.opacity = '0';
                        isShowingMessage = false;
                        showQueuedMessage();
                    }, next.duration);
                } else {
                    isShowingMessage = false;
                    showQueuedMessage();
                }
            }
        }

        // 替换原来的 waifuSay 函数为这个版本
        function waifuSay(message, duration = 3000) {
            // 不再使用看板娘的气泡，改用自己的小提示
            const existingTip = document.getElementById('cat-temp-tip');
            if (existingTip) existingTip.remove();

            const tip = document.createElement('div');
            tip.id = 'cat-temp-tip';
            tip.textContent = message;
            tip.style.cssText = `
        position: fixed;
        right: 160px;
        bottom: 90px;
        background: rgba(0,0,0,0.7);
        color: white;
        padding: 6px 12px;
        border-radius: 20px;
        font-size: 12px;
        z-index: 100000;
        white-space: nowrap;
        pointer-events: none;
        animation: catTipFade 2s ease-out forwards;
    `;

            if (!document.querySelector('#cat-tip-style')) {
                const style = document.createElement('style');
                style.id = 'cat-tip-style';
                style.innerHTML = `
            @keyframes catTipFade {
                0% { opacity: 0; transform: translateY(5px); }
                15% { opacity: 1; transform: translateY(0); }
                85% { opacity: 1; transform: translateY(0); }
                100% { opacity: 0; transform: translateY(-10px); }
            }
        `;
                document.head.appendChild(style);
            }

            document.body.appendChild(tip);
            setTimeout(() => tip.remove(), duration);
        }
        function load(index) {
            current = index;
            audio.src = playlist[index].file;
            info.innerHTML = "🎵 " + playlist[index].name;
            localStorage.setItem("cat-radio-index", index);
            waifuSay(`🎵 正在播放：${playlist[index].name}`, 2800, true);
        }

        function nextSong() {
            let next;
            do {
                next = Math.floor(Math.random() * playlist.length);
            } while (next === current && playlist.length > 1);
            load(next);
            audio.play();
            btn.innerHTML = "🎵";
        }

        function restorePlayback() {
            const savedTime = localStorage.getItem('cat-radio-time');
            const wasPlaying = localStorage.getItem('cat-radio-was-playing');
            if (savedTime && wasPlaying === 'true') {
                audio.currentTime = parseFloat(savedTime);
                info.innerHTML = "🎵 点击继续播放";
                localStorage.removeItem('cat-radio-was-playing');
            }
        }

        function savePlaybackState() {
            if (!audio.paused) {
                localStorage.setItem('cat-radio-time', audio.currentTime);
                localStorage.setItem('cat-radio-was-playing', 'true');
            }
        }

        function bindEvents() {
            if (eventsBound) return;
            eventsBound = true;

            btn.addEventListener("click", () => {
                if (audio.paused) {
                    audio.play().catch(e => console.warn("播放失败:", e));
                    btn.innerHTML = "🎵";
                    waifuSay(`🎶 开始播放 ${playlist[current].name} ~`, 2000, true);
                } else {
                    audio.pause();
                    btn.innerHTML = "🐱";
                    waifuSay("⏸️ 暂停啦，想听的时候戳我～", 1800, false);
                }
            });

            btn.addEventListener("contextmenu", (e) => {
                e.preventDefault();
                nextSong();
                waifuSay(`🐾 切歌啦！下一首是...`, 1500, true);
            });

            audio.addEventListener("ended", () => {
                nextSong();
            });

            audio.addEventListener("error", () => {
                console.warn("音频加载失败，尝试下一首");
                nextSong();
            });

            setInterval(savePlaybackState, 3000);
        }

        load(current);
        bindEvents();
        restorePlayback();

        console.log("🐱 Cat Radio v1.3 已启动");

        // Pjax 完成后修正状态
        document.addEventListener('pjax:complete', function () {
            if (!audio.paused) {
                btn.innerHTML = "🎵";
            } else {
                btn.innerHTML = "🐱";
            }
            info.innerHTML = "🎵 " + playlist[current].name;
        });
    })();
</script>
