<audio id="cat-player" preload="metadata"></audio>
<link href="https://fonts.loli.net/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<div id="cat-radio">
    <button id="cat-btn" aria-label="播放/暂停">
        <span class="material-symbols-rounded">play_arrow</span>
    </button>
    <span id="cat-info">Cat Radio</span>
    <button id="cat-loop" aria-label="循环模式">
        <span class="material-symbols-rounded">repeat</span>
    </button>
    <button id="cat-next" aria-label="下一首">
        <span class="material-symbols-rounded">skip_next</span>
    </button>
</div>

<script>
    (function () {
        if (window._musicPlayerInitialized) return;
        window._musicPlayerInitialized = true;

        const playlist = [
            { name: "oddloop", file: "/music/oddloop.mp3" },
            { name: "night dancer", file: "/music/night dancer.mp3" },
            { name: "夜に駆ける", file: "/music/夜に駆ける.mp3" },
            { name: "brain rot", file: "/music/brain rot.mp3" },
            { name: "dehors", file: "/music/dehors.mp3" },
            { name: "I love you so", file: "/music/I love you so.mp3" },
            { name: "odoriko", file: "/music/odoriko.mp3" },
            { name: "tek it", file: "/music/tek it.mp3" }
        ];

        const audio = document.getElementById("cat-player");
        const btn = document.getElementById("cat-btn");
        const playIcon = btn.querySelector(".material-symbols-rounded");
        const info = document.getElementById("cat-info");
        const loopBtn = document.getElementById("cat-loop");
        const nextBtn = document.getElementById("cat-next");

        let current = parseInt(localStorage.getItem("cat-radio-index") || "0");
        let loopMode = parseInt(localStorage.getItem("cat-radio-loop") || "1"); // 0=off, 1=all, 2=one

        function updateLoopUI() {
            const icon = loopBtn.querySelector(".material-symbols-rounded");
            icon.textContent = loopMode === 2 ? "repeat_one" : "repeat";
            loopBtn.classList.toggle("active", loopMode > 0);
        }

        function load(index) {
            current = index;
            audio.src = playlist[index].file;
            info.textContent = playlist[index].name;
            localStorage.setItem("cat-radio-index", index);
        }

        function nextSong() {
            let next = current + 1;
            if (next >= playlist.length) next = 0;
            load(next);
            audio.play();
            playIcon.textContent = "pause";
        }

        // 断点续播
        setInterval(() => {
            if (!audio.paused && !isNaN(audio.currentTime)) {
                localStorage.setItem("cat-radio-time", audio.currentTime);
                localStorage.setItem("cat-radio-playing", "true");
            }
        }, 3000);

        const savedTime = localStorage.getItem("cat-radio-time");
        const wasPlaying = localStorage.getItem("cat-radio-playing") === "true";

        load(current);
        playIcon.textContent = "play_arrow";

        if (savedTime && !isNaN(parseFloat(savedTime))) {
            audio.currentTime = parseFloat(savedTime);
        }

        if (wasPlaying) {
            const p = audio.play();
            if (p !== undefined) {
                p.then(() => { playIcon.textContent = "pause"; })
                 .catch(() => { console.log("自动播放被阻止"); });
            }
        }

        document.addEventListener("visibilitychange", () => {
            if (!document.hidden && wasPlaying && audio.paused) {
                audio.play().catch(() => {});
            }
        });

        btn.addEventListener("click", (e) => {
            e.stopPropagation();
            if (audio.paused) {
                audio.play();
                playIcon.textContent = "pause";
            } else {
                audio.pause();
                playIcon.textContent = "play_arrow";
            }
        });

        btn.addEventListener("contextmenu", (e) => {
            e.preventDefault();
            nextSong();
        });

        nextBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            nextSong();
        });

        // 触摸滑动切歌
        const radio = document.getElementById("cat-radio");
        let touchStartX = 0, touchStartY = 0;
        radio.addEventListener("touchstart", (e) => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, { passive: true });

        radio.addEventListener("touchend", (e) => {
            const dx = e.changedTouches[0].screenX - touchStartX;
            const dy = e.changedTouches[0].screenY - touchStartY;
            if (Math.abs(dx) > 30 && Math.abs(dx) > Math.abs(dy) * 2 && dx < 0) {
                nextSong();
            }
        }, { passive: true });

        audio.addEventListener("ended", () => {
            if (loopMode === 2) {
                audio.currentTime = 0;
                audio.play();
            } else if (loopMode === 1 || current < playlist.length - 1) {
                nextSong();
            }
        });

        audio.addEventListener("error", () => nextSong());

        window.addEventListener("beforeunload", () => {
            if (!audio.paused && !isNaN(audio.currentTime)) {
                localStorage.setItem("cat-radio-time", audio.currentTime);
                localStorage.setItem("cat-radio-playing", "true");
            } else {
                localStorage.setItem("cat-radio-playing", "false");
            }
        });

        updateLoopUI();
        loopBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            loopMode = (loopMode + 1) % 3;
            localStorage.setItem("cat-radio-loop", loopMode);
            updateLoopUI();
        });

        console.log("🎵 Cat Radio 已启动");
    })();
</script>
