<audio id="cat-player" preload="metadata"></audio>
<link href="https://fonts.loli.net/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<div id="cat-radio">
  <div class="cat-radio-controls">
    <button id="cat-btn" aria-label="播放/暂停">
      <span class="material-symbols-rounded">play_arrow</span>
    </button>
    <span id="cat-info">Cat Radio</span>
    <div class="cat-radio-actions">
      <button id="cat-prev" aria-label="上一首">
        <span class="material-symbols-rounded">skip_previous</span>
      </button>
      <button id="cat-loop" aria-label="循环模式">
        <span class="material-symbols-rounded">repeat</span>
      </button>
      <button id="cat-next" aria-label="下一首">
        <span class="material-symbols-rounded">skip_next</span>
      </button>
    </div>
  </div>
  <div id="cat-progress">
    <div id="cat-progress-track">
      <div id="cat-progress-fill"></div>
    </div>
  </div>
</div>

<script>
(function () {
  if (window._musicPlayerInitialized) return;
  window._musicPlayerInitialized = true;

  /* ========== 配置 ========== */
  const playlist = [
    { name: "叙利亚豪俊金曲", file: "/music/叙利亚金曲.mp3" },
    { name: "SimpsonWave1995", file: "/music/SimpsonWave1995.mp3" },
    { name: "Remove Kebab", file: "/music/Remove Kebab.mp3" },
    { name: "polkka", file: "/music/polkka.mp3" },
    { name: "I'm your baby", file: "/music/I'm your baby.mp3" },
    { name: "Episode 33", file: "/music/Episode 33.mp3" },
    { name: "oddloop", file: "/music/oddloop.mp3" },
    { name: "night dancer", file: "/music/night dancer.mp3" },
    { name: "夜に駆ける", file: "/music/夜に駆ける.mp3" },
    { name: "brain rot", file: "/music/brain rot.mp3" },
    { name: "dehors", file: "/music/dehors.mp3" },
    { name: "I love you so", file: "/music/I love you so.mp3" },
    { name: "odoriko", file: "/music/odoriko.mp3" },
    { name: "tek it", file: "/music/tek it.mp3" }
  ];

  /* ========== DOM 引用 ========== */
  const audio   = document.getElementById("cat-player");
  const radio   = document.getElementById("cat-radio");
  const btn     = document.getElementById("cat-btn");
  const playIcon = btn.querySelector(".material-symbols-rounded");
  const info    = document.getElementById("cat-info");
  const prevBtn = document.getElementById("cat-prev");
  const nextBtn = document.getElementById("cat-next");
  const loopBtn = document.getElementById("cat-loop");
  const loopIcon = loopBtn.querySelector(".material-symbols-rounded");
  const fill    = document.getElementById("cat-progress-fill");
  const track   = document.getElementById("cat-progress-track");

  /* ========== 状态 ========== */
  let current   = parseInt(localStorage.getItem("cat-radio-index") || "0");
  let loopMode  = parseInt(localStorage.getItem("cat-radio-loop")   || "1"); // 0=停 1=列表 2=单曲
  let isDragging = false;

  /* ========== 播放 ========== */
  function play() {
    audio.play();
    playIcon.textContent = "pause";
  }

  function pause() {
    audio.pause();
    playIcon.textContent = "play_arrow";
  }

  function togglePlay() {
    audio.paused ? play() : pause();
  }

  /* ========== 切歌 ========== */
  function load(index) {
    current = index;
    audio.src = playlist[index].file;
    info.textContent = playlist[index].name;
    localStorage.setItem("cat-radio-index", index);
  }

  function nextSong() {
    const next = (current + 1) % playlist.length;
    fill.style.width = "0%";
    load(next);
    play();
  }

  function prevSong() {
    const prev = (current - 1 + playlist.length) % playlist.length;
    fill.style.width = "0%";
    load(prev);
    play();
  }

  /* ========== 进度 ========== */
  function updateProgress() {
    const p = audio.duration ? audio.currentTime / audio.duration : 0;
    fill.style.width = (p * 100) + "%";
  }

  function seekFromEvent(e) {
    if (!audio.duration) return;
    const rect = track.getBoundingClientRect();
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    const r = Math.max(0, Math.min(1, (x - rect.left) / rect.width));
    audio.currentTime = r * audio.duration;
    fill.style.width = (r * 100) + "%";
  }

  /* ========== 循环模式 ========== */
  function updateLoopUI() {
    loopIcon.textContent = loopMode === 2 ? "repeat_one" : "repeat";
    loopBtn.classList.toggle("active", loopMode > 0);
  }

  function cycleLoop() {
    loopMode = (loopMode + 1) % 3;
    localStorage.setItem("cat-radio-loop", loopMode);
    updateLoopUI();
  }

  /* ========== 断点续播 ========== */
  function saveState() {
    if (!isNaN(audio.currentTime)) {
      localStorage.setItem("cat-radio-time", audio.currentTime);
      localStorage.setItem("cat-radio-playing", audio.paused ? "false" : "true");
    }
  }

  /* ========== 事件绑定 ========== */

  // 进度条
  track.addEventListener("click", seekFromEvent);
  track.addEventListener("mousedown", (e) => { isDragging = true; seekFromEvent(e); });
  document.addEventListener("mousemove", (e) => { if (isDragging) seekFromEvent(e); });
  document.addEventListener("mouseup", () => { isDragging = false; });
  track.addEventListener("touchstart", seekFromEvent, { passive: true });
  track.addEventListener("touchmove", seekFromEvent, { passive: true });

  // 播放按钮
  btn.addEventListener("click", (e) => { e.stopPropagation(); togglePlay(); });
  btn.addEventListener("contextmenu", (e) => { e.preventDefault(); nextSong(); });

  // 切歌
  prevBtn.addEventListener("click", (e) => { e.stopPropagation(); prevSong(); });
  nextBtn.addEventListener("click", (e) => { e.stopPropagation(); nextSong(); });

  // 循环
  loopBtn.addEventListener("click", (e) => { e.stopPropagation(); cycleLoop(); });

  // 触摸滑动切歌
  let tx = 0, ty = 0;
  radio.addEventListener("touchstart", (e) => {
    tx = e.changedTouches[0].screenX;
    ty = e.changedTouches[0].screenY;
  }, { passive: true });
  radio.addEventListener("touchend", (e) => {
    const dx = e.changedTouches[0].screenX - tx;
    const dy = e.changedTouches[0].screenY - ty;
    if (Math.abs(dx) > 30 && Math.abs(dx) > Math.abs(dy) * 2) {
      dx < 0 ? nextSong() : prevSong();
    }
  }, { passive: true });

  // 音频事件
  audio.addEventListener("play",     () => radio.classList.add("playing"));
  audio.addEventListener("pause",    () => radio.classList.remove("playing"));
  audio.addEventListener("timeupdate", updateProgress);
  audio.addEventListener("ended", () => {
    if (loopMode === 0) {
      audio.currentTime = 0;
      fill.style.width = "0%";
      pause();
    } else if (loopMode === 1) {
      nextSong();
    } else {
      audio.currentTime = 0;
      fill.style.width = "0%";
      audio.play();
    }
  });
  audio.addEventListener("error", () => nextSong());

  // 页面可见性变化
  document.addEventListener("visibilitychange", () => {
    if (!document.hidden && audio.paused && localStorage.getItem("cat-radio-playing") === "true") {
      audio.play().catch(() => {});
    }
  });

  // 离开时保存
  window.addEventListener("beforeunload", saveState);
  setInterval(saveState, 3000);

  /* ========== 初始化 ========== */
  load(current);
  updateLoopUI();
  playIcon.textContent = "play_arrow";
  fill.style.width = "0%";

  const savedTime = localStorage.getItem("cat-radio-time");
  if (savedTime && !isNaN(parseFloat(savedTime))) {
    audio.currentTime = parseFloat(savedTime);
  }

  if (localStorage.getItem("cat-radio-playing") === "true") {
    const p = audio.play();
    if (p !== undefined) p.then(() => { playIcon.textContent = "pause"; }).catch(() => {});
  }
})();
</script>
